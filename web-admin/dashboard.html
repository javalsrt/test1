<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学习中心 · 管理后台</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        /* ===== iOS 简约风格主题 ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-white: #FFFFFF;
            --bg-card: #F5F5F7;
            --bg-hover: #EBEBED;
            --border: #E5E7EB;
            --text-primary: #1D1D1F;
            --text-secondary: #86868B;
            --text-tertiary: #C7C7CC;
            --accent-blue: #0A84FF;
            --accent-green: #34C759;
            --accent-orange: #FF9500;
            --accent-red: #FF3B30;
            --radius-card: 14px;
            --radius-btn: 8px;
            --shadow: 0 1px 3px rgba(0,0,0,0.06);
            --shadow-md: 0 2px 8px rgba(0,0,0,0.08);
            --font: -apple-system, "SF Pro Display", "PingFang SC", "Helvetica Neue", sans-serif;
            --sidebar-width: 220px;
            --header-height: 60px;
        }
        html { font-size: 14px; }
        body {
            font-family: var(--font);
            background: var(--bg-card);
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
            height: 100vh;
            overflow: hidden;
        }
        #app { display: flex; height: 100vh; }

        /* ===== 侧边栏 ===== */
        .sidebar {
            width: var(--sidebar-width); min-width: var(--sidebar-width);
            background: var(--bg-white); border-right: 1px solid var(--border);
            display: flex; flex-direction: column;
        }
        .sidebar-header {
            display: flex; align-items: center; gap: 10px;
            padding: 18px 18px 14px; border-bottom: 1px solid var(--border);
        }
        .logo-icon {
            width: 34px; height: 34px; background: #E8F0FE; border-radius: 10px;
            display: flex; align-items: center; justify-content: center; font-size: 18px;
        }
        .logo-text { font-size: 16px; font-weight: 600; color: var(--text-primary); letter-spacing: -0.02em; }
        .nav-list { list-style: none; padding: 12px 10px; flex: 1; display: flex; flex-direction: column; gap: 2px; }
        .nav-item {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 12px; border-radius: var(--radius-btn);
            cursor: pointer; color: var(--text-secondary); font-size: 14px;
            transition: all 0.15s; user-select: none;
        }
        .nav-item:hover { background: var(--bg-card); color: var(--text-primary); }
        .nav-item.active { background: #E8F0FE; color: var(--accent-blue); font-weight: 500; }
        .nav-icon { width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; }

        .sidebar-footer {
            border-top: 1px solid var(--border); padding: 14px 16px;
            display: flex; align-items: center; gap: 10px;
        }
        .s-avatar {
            width: 36px; height: 36px; border-radius: 50%;
            background: var(--accent-blue); color: white;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; font-weight: 500; flex-shrink: 0;
        }
        .s-info { display: flex; flex-direction: column; }
        .s-name { font-size: 13px; font-weight: 500; }
        .s-role { font-size: 11px; color: var(--text-secondary); }
        .logout-btn {
            margin-left: auto; font-size: 12px; color: var(--text-tertiary);
            cursor: pointer; padding: 4px 8px; border-radius: 4px;
        }
        .logout-btn:hover { color: var(--accent-red); background: #FFF0F0; }

        /* ===== 主内容 ===== */
        .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .top-bar {
            background: var(--bg-white); padding: 0 24px; height: var(--header-height);
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid var(--border); flex-shrink: 0;
        }
        .page-title { font-size: 18px; font-weight: 600; letter-spacing: -0.02em; }
        .page-sub { font-size: 13px; color: var(--text-secondary); margin-left: 12px; }
        .top-right { display: flex; align-items: center; gap: 14px; font-size: 13px; color: var(--text-secondary); }

        .content { flex: 1; overflow-y: auto; padding: 20px 24px 32px; }

        /* ===== 卡片 ===== */
        .card {
            background: var(--bg-white); border-radius: var(--radius-card);
            padding: 18px 20px; box-shadow: var(--shadow); margin-bottom: 14px;
        }
        .card-title { font-size: 15px; font-weight: 500; margin-bottom: 14px; }
        .stats-grid {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 14px;
        }
        .stat-item {
            background: var(--bg-white); border-radius: var(--radius-card);
            padding: 16px 18px; box-shadow: var(--shadow);
        }
        .stat-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; }
        .stat-value { font-size: 26px; font-weight: 600; letter-spacing: -0.03em; }
        .stat-change { font-size: 11px; margin-top: 4px; color: var(--text-secondary); }
        .stat-change.up { color: var(--accent-green); }
        .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .chart-box { height: 200px; position: relative; }

        .data-table { width: 100%; border-collapse: collapse; }
        .data-table th {
            text-align: left; padding: 10px 12px; font-size: 12px;
            font-weight: 500; color: var(--text-secondary);
            background: var(--bg-card); border-radius: 6px;
        }
        .data-table td {
            padding: 10px 12px; font-size: 13px; border-bottom: 1px solid var(--border);
        }
        .data-table tr:hover td { background: #FAFAFA; }

        .status { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 500; }
        .status.on { color: #34C759; background: #E8F8ED; }
        .status.off { color: #86868B; background: #F5F5F7; }

        /* ===== 欢迎卡片 ===== */
        .welcome-card {
            background: linear-gradient(135deg, #0A84FF 0%, #0060C8 100%);
            border-radius: var(--radius-card); padding: 28px 32px; margin-bottom: 20px;
            color: white;
        }
        .welcome-card h2 { font-size: 22px; font-weight: 600; }
        .welcome-card p { font-size: 14px; opacity: 0.8; margin-top: 6px; }
        .content::-webkit-scrollbar { width: 6px; }
        .content::-webkit-scrollbar-thumb { background: #D1D1D6; border-radius: 3px; }
        .content::-webkit-scrollbar-track { background: transparent; }
    </style>
</head>
<body>
<div id="app">
    <!-- 侧边栏 -->
    <nav class="sidebar">
        <div class="sidebar-header">
            <div class="logo-icon">📘</div>
            <span class="logo-text">学习中心</span>
        </div>
        <ul class="nav-list">
            <li class="nav-item active" data-page="dashboard"><span class="nav-icon">📊</span>数据总览</li>
            <li class="nav-item" data-page="courses"><span class="nav-icon">📋</span>课程管理</li>
            <li class="nav-item" data-page="students"><span class="nav-icon">👥</span>学生列表</li>
            <li class="nav-item" data-page="stats"><span class="nav-icon">📈</span>学习统计</li>
            <li class="nav-item" data-page="manage"><span class="nav-icon">🏫</span>班级管理</li>
            <li class="nav-item"><span class="nav-icon">⚙️</span>系统设置</li>
        </ul>
        <div class="sidebar-footer">
            <div class="s-avatar" id="sAvatar">王</div>
            <div class="s-info">
                <span class="s-name" id="sName">王老师</span>
                <span class="s-role">教师管理员</span>
            </div>
            <span class="logout-btn" onclick="handleLogout()">退出</span>
        </div>
    </nav>

    <!-- 主内容 -->
    <div class="main-content">
        <header class="top-bar">
            <div>
                <span class="page-title">数据总览</span>
                <span class="page-sub">欢迎回来</span>
            </div>
            <div class="top-right">
                <span id="headerDate"></span>
            </div>
        </header>
        <div class="content" id="pageContent">
            <!-- 动态加载 -->
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script>
    // ===== 鉴权检查 =====
    const token = localStorage.getItem('token');
    if (!token) {
        window.location.href = 'login.html';
    }

    const userName = localStorage.getItem('userName') || '教师';
    const userId = localStorage.getItem('userId');
    const role = localStorage.getItem('role');
    document.getElementById('sName').textContent = userName;
    document.getElementById('sAvatar').textContent = userName.charAt(0);

    // 自动判断：本地开发用 localhost，部署到服务器走 Nginx 代理
    const API = (location.hostname === 'localhost' || location.hostname === '127.0.0.1'
        || location.hostname === '' || location.protocol === 'file:')
        ? 'http://localhost:8080' : '';

    // ===== 全局 fetch 拦截：401/403 时踢出登录 =====
    const originalFetch = window.fetch;
    window.fetch = async function(...args) {
        const resp = await originalFetch.apply(this, args);
        if (resp.status === 401 || resp.status === 403) {
            alert('登录已过期，请重新登录');
            localStorage.clear();
            window.location.href = 'login.html';
            throw new Error('unauthorized');
        }
        return resp;
    };

    const now = new Date();
    document.getElementById('headerDate').textContent =
        `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日`;

    function handleLogout() {
        localStorage.clear();
        window.location.href = 'login.html';
    }

    // ===== 导航切换 =====
    document.querySelectorAll('.nav-item[data-page]').forEach(item => {
        item.addEventListener('click', function() {
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            this.classList.add('active');
            const page = this.dataset.page;
            document.querySelector('.page-title').textContent =
                page === 'dashboard' ? '数据总览' :
                page === 'courses' ? '课程管理' :
                page === 'stats' ? '学习统计' : page;
            document.querySelector('.page-sub').textContent =
                page === 'dashboard' ? '欢迎回来' :
                page === 'courses' ? '查看所教课程与班级' :
                page === 'stats' ? '班级图谱 · 个人图谱' :
                page === 'manage' ? '创建班级 · 导入课表 · 导入学生' : '';
            if (page === 'dashboard') loadDashboard();
            else if (page === 'courses') loadCourses();
            else if (page === 'stats') loadStats();
            else if (page === 'manage') loadManage();
            else document.getElementById('pageContent').innerHTML =
                `<div style="text-align:center;padding:80px 0;color:#86868B;">功能开发中...</div>`;
        });
    });

    // ===== 连接教师 WebSocket（接收学生上下线通知） =====
    let teacherWs = null, wsFailCount = 0, wsConnectTimer = null;
    function connectTeacherWs() {
        if (teacherWs && teacherWs.readyState === WebSocket.OPEN) return;
        if (wsFailCount >= 5) { console.log('WebSocket 已停止重连'); return; }

        const wsBase = (location.hostname === 'localhost' || location.hostname === '127.0.0.1'
            || location.hostname === '' || location.protocol === 'file:')
            ? 'ws://localhost:8080' : location.origin.replace(/^http/, 'ws');
        const wsUrl = wsBase + '/ws/schedule?userId=' + userId + '&role=teacher';

        teacherWs = new WebSocket(wsUrl);

        teacherWs.onopen = () => {
            wsFailCount = 0;
            console.log('教师 WebSocket 已连接');
        };

        teacherWs.onmessage = (e) => {
            try {
                const msg = JSON.parse(e.data);
                if (msg.type === 'student_online') updateStudentStatus(msg.data.userId, true);
                else if (msg.type === 'student_offline') updateStudentStatus(msg.data.userId, false);
            } catch (err) {}
        };

        teacherWs.onclose = () => {
            teacherWs = null;
            wsFailCount++;
            if (wsConnectTimer) clearTimeout(wsConnectTimer);
            wsConnectTimer = setTimeout(connectTeacherWs, wsFailCount >= 3 ? 30000 : 5000);
        };
        teacherWs.onerror = () => { teacherWs = null; };
    }

    function updateStudentStatus(userId, online) {
        // 更新"活跃学生"表格中的在线状态
        const row = document.querySelector('[data-uid="' + userId + '"]');
        if (!row) return;
        const statusCell = row.querySelector('.status');
        if (!statusCell) return;
        statusCell.className = 'status ' + (online ? 'on' : 'off');
        statusCell.textContent = online ? '● 在线' : '● 离线';

        // 刷新"今日在线"统计数字
        const onlineCount = document.querySelectorAll('.status.on').length;
        const statLabels = document.querySelectorAll('.stat-label');
        for (const label of statLabels) {
            if (label.textContent.includes('今日在线')) {
                const valEl = label.nextElementSibling || label.parentElement.querySelector('.stat-value');
                if (valEl) valEl.textContent = onlineCount;
                break;
            }
        }
    }

    connectTeacherWs();

    // ===== 加载仪表盘 =====
    loadDashboard();

    async function loadDashboard() {
        const content = document.getElementById('pageContent');
        content.innerHTML = '<div style="text-align:center;padding:60px;color:#86868B;">加载中...</div>';

        try {
            // 并行获取统计数据 + 趋势数据
            const [statsRes, trendRes] = await Promise.all([
                fetch(API + '/api/teacher/stats', { headers: { 'Authorization': 'Bearer ' + token } }),
                fetch(API + '/api/teacher/trend', { headers: { 'Authorization': 'Bearer ' + token } })
            ]);

            let stats = { totalStudents: 0, onlineToday: 0, avgFocusMinutes: 0, quizAccuracy: 0, subjectAccuracy: [], students: [] };
            let trend = [];

            if (statsRes.ok) stats = await statsRes.json();
            if (trendRes.ok) trend = await trendRes.json();

            // 格式化平均时长为 h 或 min
            let avgStr = '0h';
            if (stats.avgFocusMinutes >= 60) {
                avgStr = (stats.avgFocusMinutes / 60).toFixed(1) + 'h';
            } else {
                avgStr = stats.avgFocusMinutes + 'min';
            }

            content.innerHTML = `
                <div class="welcome-card">
                    <h2>👋 欢迎回来，${userName}老师</h2>
                    <p>今天是 ${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日，祝您工作愉快</p>
                </div>
                <div class="stats-grid">
                    <div class="stat-item"><div class="stat-label">学生总人数</div><div class="stat-value" style="color:#0A84FF;">${stats.totalStudents}</div><div class="stat-change">累计</div></div>
                    <div class="stat-item"><div class="stat-label">今日在线</div><div class="stat-value" style="color:#34C759;">${stats.onlineToday}</div><div class="stat-change">今日活跃</div></div>
                    <div class="stat-item"><div class="stat-label">平均学习时长</div><div class="stat-value">${avgStr}</div><div class="stat-change">今日人均</div></div>
                    <div class="stat-item"><div class="stat-label">刷题正确率</div><div class="stat-value" style="color:#FF9500;">${stats.quizAccuracy}%</div><div class="stat-change">累计</div></div>
                </div>
                <div class="charts-grid">
                    <div class="card"><div class="card-title">学习时长趋势（近7天·分钟）</div><div class="chart-box"><canvas id="chartTrend"></canvas></div></div>
                    <div class="card"><div class="card-title">各科目正确率</div><div class="chart-box"><canvas id="chartSubjects"></canvas></div></div>
                </div>
                <div class="card">
                    <div class="card-title">活跃学生（按今日专注排序）</div>
                    ${buildStudentTable(stats.students)}
                </div>
            `;

            // 初始化趋势图
            setTimeout(() => initCharts(trend, stats.subjectAccuracy || []), 100);

        } catch (e) {
            content.innerHTML = '<div style="text-align:center;padding:60px;color:#FF3B30;">无法连接后端服务器</div>';
        }
    }

    function buildStudentTable(students) {
        if (!students || students.length === 0) {
            return '<div style="text-align:center;padding:20px;color:#86868B;">暂无数据</div>';
        }
        let html = '<table class="data-table"><thead><tr><th>姓名</th><th>学号</th><th>班级</th><th>今日专注</th><th>状态</th></tr></thead><tbody>';
        students.forEach(s => {
            let todayMin = Math.round((s.todaySeconds || 0) / 60);
            let online = s.online === 1;
            html += '<tr data-uid="' + (s.id || '') + '">' +
                '<td>' + (s.realName || '') + '</td>' +
                '<td>' + (s.studentNo || '') + '</td>' +
                '<td>' + (s.className || '') + '</td>' +
                '<td>' + todayMin + ' 分钟</td>' +
                '<td><span class="status ' + (online ? 'on' : 'off') + '">' + (online ? '● 在线' : '● 离线') + '</span></td>' +
                '</tr>';
        });
        html += '</tbody></table>';
        return html;
    }

    function initCharts(trend, subjectData) {
        // 近7天日期
        const days = [];
        const data = [];
        for (let i = 6; i >= 0; i--) {
            const d = new Date(); d.setDate(d.getDate() - i);
            days.push((d.getMonth()+1) + '/' + d.getDate());
            data.push(0);
        }
        trend.forEach(t => {
            const d = t.date;
            for (let i = 0; i < days.length; i++) {
                const ref = new Date(); ref.setDate(ref.getDate() - (6-i));
                const refStr = ref.getFullYear() + '-' +
                    String(ref.getMonth()+1).padStart(2,'0') + '-' +
                    String(ref.getDate()).padStart(2,'0');
                if (d === refStr || d.startsWith(refStr)) data[i] = Math.round(t.minutes || 0);
            }
        });

        const ctx1 = document.getElementById('chartTrend');
        if (ctx1) new Chart(ctx1, {
            type: 'line', data: {
                labels: days, datasets: [{
                    data, borderColor:'#0A84FF',
                    backgroundColor:'rgba(10,132,255,0.08)', borderWidth:2,
                    tension:0.4, pointRadius:3, fill:true
                }]
            }, options: {
                responsive:true, maintainAspectRatio:false,
                plugins:{legend:{display:false}},
                scales:{
                    x:{grid:{color:'rgba(229,231,235,0.6)'}, ticks:{color:'#86868B',font:{size:11}}},
                    y:{grid:{color:'rgba(229,231,235,0.6)'}, ticks:{color:'#86868B',font:{size:11}}, beginAtZero:true}
                }
            }
        });

        const ctx2 = document.getElementById('chartSubjects');
        if (ctx2) {
            const labels = (subjectData || []).map(s => s.name.length > 8 ? s.name.substring(0,7)+'…' : s.name);
            const vals = (subjectData || []).map(s => parseFloat(s.accuracy) || 0);
            const colors = ['#5E6AD2','#34C759','#FF9500','#AF52DE','#0A84FF','#FF3B30','#5856D6','#FF2D55'];
            if (labels.length === 0) { labels.push('暂无数据'); vals.push(0); }
            new Chart(ctx2, {
                type: 'bar', data: {
                    labels: labels,
                    datasets:[{data:vals, backgroundColor: labels.map((_,i)=>colors[i%colors.length]), borderRadius:4}]
                }, options: {
                    responsive:true, maintainAspectRatio:false,
                    plugins:{legend:{display:false}},
                    scales:{
                        x:{grid:{color:'rgba(229,231,235,0.6)'}, ticks:{color:'#86868B',font:{size:11}}},
                        y:{grid:{color:'rgba(229,231,235,0.6)'}, ticks:{color:'#86868B',font:{size:11}, callback:v=>v+'%'}, beginAtZero:true, max:100}
                    }
                }
            });
        }
    }

    // ===== 课程管理 =====

    async function loadCourses() {
        const content = document.getElementById('pageContent');
        content.innerHTML = '<div style="text-align:center;padding:60px;color:#86868B;">加载中...</div>';

        try {
            const res = await fetch(API + '/api/schedule/teacher/courses', {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            if (!res.ok) { content.innerHTML = '<div style="text-align:center;padding:60px;color:#FF3B30;">无法加载</div>'; return; }
            const courses = await res.json();
            window._allCourses = courses; // 保存全局课程数据（含 credit）

            // 按 active 状态分组：active===true 在线，否则已下架
            const activeCourses = courses.filter(c => c.active === true);
            const hiddenCourses = courses.filter(c => c.active !== true);

            let html = '';

            // 导入课表按钮
            html += '<div class="card" style="margin-bottom:20px;padding:14px 20px;display:flex;align-items:center;gap:12px;">';
            html += '<button class="btn btn-primary" onclick="showImportDialog()" style="padding:8px 18px;">📥 导入课表</button>';
            html += '<span style="font-size:12px;color:#86868B;">支持 xlsx / pdf / doc / docx / 图片，AI 自动提取</span>';
            html += '</div>';

            // ==== 在线课程 ====
            html += '<div style="margin-bottom:16px;">';
            html += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">';
            html += '<h2 style="font-size:18px;font-weight:600;color:#1D1D1F;">📋 在线课程</h2>';
            html += '<span style="font-size:13px;color:#86868B;">共 ' + activeCourses.length + ' 门</span>';
            html += '</div>';

            if (activeCourses.length === 0) {
                html += '<div class="card" style="text-align:center;padding:40px;color:#86868B;">暂无在线课程，请导入课表或上架已下架课程</div>';
            } else {
                activeCourses.forEach(c => {
                    html += buildCourseCard(c, true);
                });
            }
            html += '</div>';

            // ==== 已下架课程 ====
            if (hiddenCourses.length > 0) {
                html += '<div style="margin-bottom:16px;">';
                html += '<div style="display:flex;align-items:center;justify-content:space-between;margin:28px 0 14px;">';
                html += '<h2 style="font-size:18px;font-weight:600;color:#86868B;">📦 已下架课程</h2>';
                html += '<span style="font-size:13px;color:#86868B;">共 ' + hiddenCourses.length + ' 门</span>';
                html += '</div>';

                hiddenCourses.forEach(c => {
                    html += buildCourseCard(c, false);
                });
                html += '</div>';
            }

            content.innerHTML = html;
        } catch (e) {
            content.innerHTML = '<div style="text-align:center;padding:60px;color:#FF3B30;">无法连接后端服务器</div>';
        }
    }

    /** 构建课程卡片（支持在线课程也显示班级排课状态） */
    function buildCourseCard(c, active) {
        let totalStudents = 0;
        let classData = [];
        if (c.classes && c.classes.length > 0) {
            c.classes.forEach(cl => {
                totalStudents += cl.studentCount;
                classData.push({
                    classId: cl.classId, className: cl.className,
                    studentCount: cl.studentCount, scheduled: cl.scheduled || false
                });
            });
        }

        // 将课程名存入全局映射，避免 onclick 中拼接字符串导致 HTML 截断
        if (!window._courseNameMap) window._courseNameMap = {};
        if (!window._classNameMap) window._classNameMap = {};
        window._courseNameMap[c.courseId] = c.courseName;
        classData.forEach(cl => {
            window._classNameMap[cl.classId] = cl.className;
        });

        const cardStyle = active
            ? 'border-left: 4px solid #0A84FF;'
            : 'border-left: 4px solid #C7C7CC;';
        const nameColor = active ? '#1D1D1F' : '#86868B';
        const cardId = 'courseCard_' + c.courseId;

        let html = '<div class="card" id="' + cardId + '" style="margin-bottom:12px;padding:18px 22px;' + cardStyle + '">';

        html += '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;">';
        html += '<div style="flex:1;min-width:0;">';
        html += '<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">';
        html += '<span style="font-size:16px;font-weight:600;color:' + nameColor + ';">' + escHtml(c.courseName) + '</span>';
        html += '<span style="font-size:11px;color:#86868B;background:#F5F5F7;padding:2px 10px;border-radius:20px;">'
            + escHtml(c.semester || '2025-2026-2') + '</span>';
        if (!active) {
            html += '<span style="font-size:11px;color:#FF9500;background:#FFF8F0;padding:2px 10px;border-radius:20px;">已下架</span>';
        }
        html += '</div>';
        if (c.description) {
            html += '<div style="margin-top:4px;font-size:12px;color:#A0AEC0;">' + escHtml(c.description) + '</div>';
        }
        html += '</div>';

        // 右侧操作区
        html += '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px;flex-shrink:0;margin-left:16px;">';

        // 班级标签
        if (classData.length > 0) {
            html += '<div style="display:flex;flex-wrap:wrap;gap:6px;justify-content:flex-end;">';
            classData.forEach(cl => {
                const sched = cl.scheduled === true || cl.scheduled === 'true';
                const bg = sched ? '#E8F0FE' : '#F5F5F7';
                const color = sched ? '#0A84FF' : '#86868B';
                const border = sched ? '#B8D4FE' : '#E5E7EB';
                const icon = sched ? '✔' : '○';
                const tagId = 'clazzTag_' + c.courseId + '_' + cl.classId;
                html += '<span id="' + tagId + '" style="display:inline-flex;align-items:center;gap:4px;background:' + bg + ';color:' + color
                    + ';padding:3px 10px;border-radius:6px;font-size:11px;white-space:nowrap;border:1px solid ' + border + ';">'
                    + icon + ' ' + escHtml(cl.className) + ' ' + cl.studentCount + '人</span>';
            });
            html += '</div>';
            if (c.classes && c.classes.length > 1) {
                html += '<span style="font-size:11px;color:#A0AEC0;">共 ' + c.classes.length + ' 个班 · '
                    + totalStudents + ' 名学生</span>';
            }
        }

        // 操作按钮区域
        html += '<div style="display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end;">';
        // 在线课程：显示每个班级的排课按钮
        if (active) {
            classData.forEach(cl => {
                const sched = cl.scheduled === true || cl.scheduled === 'true';
                html += '<button style="padding:3px 8px;font-size:11px;background:#E8F0FE;color:#0A84FF;'
                    + 'border:1px solid ' + (sched ? '#0A84FF' : '#B8D4FE') + ';border-radius:6px;cursor:pointer;transition:all 0.15s;white-space:nowrap;" '
                    + 'onclick="openSchedulePlannerById(' + c.courseId + ',' + cl.classId + ',' + sched + ')">'
                    + (sched ? '📝 ' : '📅 ') + escHtml(cl.className) + '</button>';
            });
            html += '<button style="padding:4px 12px;font-size:12px;background:none;color:#C7C7CC;'
                + 'border:1px solid #E5E7EB;border-radius:6px;cursor:pointer;" '
                + 'onclick="hideCourseById(' + c.courseId + ')">下架</button>';
        } else {
            // 已下架课程：只有上架和移除按钮，上架始终可用（不排课直接上架）
            html += '<button style="padding:4px 12px;font-size:12px;background:#0A84FF;color:#fff;'
                + 'border:none;border-radius:6px;cursor:pointer;" '
                + 'onclick="unhideCourseDirect(' + c.courseId + ')">上架</button>';
            html += '<button style="padding:4px 12px;font-size:12px;background:none;color:#FF3B30;'
                + 'border:1px solid #FF3B30;border-radius:6px;cursor:pointer;" '
                + 'onclick="removeCourseById(' + c.courseId + ')">移除课程</button>';
        }
        html += '</div>';
        html += '</div>';

        html += '</div>';
        html += '</div>';  // 关闭最外层 .card div
        // 验证 div 配对
        const openCount = (html.match(/<div/g) || []).length;
        const closeCount = (html.match(/<\/div>/g) || []).length;
        if (openCount !== closeCount) {
            console.error('⚠️ 课程卡片 div 不匹配！courseId=' + c.courseId + ', 课程名=' + c.courseName
                + ', 打开=' + openCount + ', 关闭=' + closeCount + ', 差值=' + (openCount - closeCount));
        }
        return html;
    }

    // 通过 ID 获取课程名和班级名
    function getCourseName(courseId) {
        return (window._courseNameMap && window._courseNameMap[courseId]) || '';
    }
    function getClassName(classId) {
        return (window._classNameMap && window._classNameMap[classId]) || '';
    }

    function openSchedulePlannerById(courseId, classId, scheduled) {
        const courseName = getCourseName(courseId);
        const className = getClassName(classId);
        openSchedulePlanner(courseName, classId, className, courseId, scheduled);
    }
    function hideCourseById(courseId) {
        hideCourse(getCourseName(courseId));
    }
    function removeCourseById(courseId) {
        removeCourse(getCourseName(courseId));
    }

    /** 已下架课程直接上架（不排课） */
    async function unhideCourseDirect(courseId) {
        const courseName = getCourseName(courseId);
        if (!confirm('确定上架「' + courseName + '」？\n\n上架后课程将出现在"在线课程"中，您可以在线课程中为各班级手动排课。')) return;
        try {
            const res = await fetch(API + '/api/schedule/import/unhide', {
                method: 'POST',
                headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
                body: JSON.stringify({ courseName: courseName, slots: [] })
            });
            const data = await res.json();
            if (data.error) { alert(data.error); } else { loadCourses(); }
        } catch(e) { alert('操作失败'); }
    }

    /** HTML 转义（防止课程名中的特殊字符破坏 DOM） */
    function escHtml(str) {
        return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    /** JS 字符串转义（用于 onclick 属性中传递课程名，HTML属性中单引号需转&#39;） */
    function escJs(str) {
        return String(str).replace(/\\/g, '\\\\').replace(/'/g, "&#39;").replace(/"/g, '&quot;');
    }

    async function hideCourse(name) {
        if (!confirm('确定下架「' + name + '」？\n\n下架后该课程将从学生课表中移除，不再显示。')) return;
        try {
            await fetch(API + '/api/schedule/import/hide', {
                method: 'POST',
                headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
                body: JSON.stringify({ courseName: name })
            });
            loadCourses();
        } catch (e) {
            alert('操作失败');
        }
    }

    async function removeCourse(name) {
        // 自定义弹窗
        const overlay = document.createElement('div');
        overlay.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.35);z-index:999;display:flex;align-items:center;justify-content:center;';
        overlay.innerHTML = '<div style="background:#fff;border-radius:14px;padding:28px 32px;width:420px;box-shadow:0 4px 24px rgba(0,0,0,0.12);text-align:center;">'
            + '<div style="font-size:40px;margin-bottom:12px;">⚠️</div>'
            + '<h3 style="font-size:17px;font-weight:600;color:#1D1D1F;margin-bottom:8px;">移除课程</h3>'
            + '<p style="font-size:14px;color:#86868B;margin-bottom:8px;">确定要移除「<strong style="color:#1D1D1F;">' + escHtml(name) + '</strong>」吗？</p>'
            + '<p style="font-size:12px;color:#FF3B30;margin-bottom:20px;">此操作将从数据库中删除该课程及其相关数据，不可恢复。</p>'
            + '<div style="display:flex;gap:12px;justify-content:center;">'
            + '<button id="btnRemoveCancel" style="padding:8px 28px;border-radius:8px;border:1px solid #E5E7EB;background:#fff;color:#1D1D1F;font-size:14px;cursor:pointer;">取消</button>'
            + '<button id="btnRemoveConfirm" style="padding:8px 28px;border-radius:8px;background:#FF3B30;color:#fff;border:none;font-size:14px;cursor:pointer;">确认</button>'
            + '</div></div>';
        document.body.appendChild(overlay);

        // 取消按钮
        document.getElementById('btnRemoveCancel').onclick = function() { overlay.remove(); };
        // 点击遮罩关闭
        overlay.addEventListener('click', function(e) { if (e.target === overlay) overlay.remove(); });

        // 确认按钮
        document.getElementById('btnRemoveConfirm').onclick = async function() {

            try {
                const res = await fetch(API + '/api/schedule/import/remove', {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ courseName: name })
                });
                const data = await res.json();

                    alert(data.error);
                } else {
                    loadCourses();

    // ===== 排课弹窗（课程表选择空位）=====
    // 课时计算：1个大节时段(08:30-09:55) = 2课时
    const PERIOD_CREDIT = 2; // 每个空位代表2课时

    let schedulePlannerState = {
        courseName: '', classId: null, className: '', courseId: null,
        totalCredit: 2, remainingCredit: 2, selectedSlots: [], existingCourses: [],
        currentWeek: 1
    };

    // 计算当前教学周
    function getCurrentTeachWeek() {
        const startDate = new Date(2026, 2, 9); // 3月9日第一周周一
        const now = new Date();
        const diffDays = Math.floor((now - startDate) / (1000 * 60 * 60 * 24));
        return Math.max(1, Math.min(18, Math.floor(diffDays / 7) + 1));
    }

    /** 打开排课弹窗（scheduled: true=已排课可修改，false=未排课） */
    async function openSchedulePlanner(courseName, classId, className, courseId, scheduled) {
        // onclick 传递的 boolean 会变成字符串，需要显式转换
        scheduled = scheduled === true || scheduled === 'true';
        let totalCredit = 2;
        if (window._allCourses) {
            const course = window._allCourses.find(c => c.courseId === courseId);
            if (course && course.credit) totalCredit = parseInt(course.credit);
        }
        const curWeek = getCurrentTeachWeek();

        let selectedSlots = [];
        let usedCredit = 0;

        // 如果已排课，加载已有排课信息（week=0 查所有周）
        if (scheduled) {
            try {
                const res = await fetch(API + '/api/schedule/teacher/class-schedule?classId='
                    + classId + '&week=0', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const data = await res.json();
                // 找到该课程的已有记录，按 (dayOfWeek, startNode) 去重（多个学生会有重复记录）
                const seen = {};
                (data.schedules || [])
                    .filter(s => s.course_name === courseName && s.day_of_week > 0)
                    .forEach(s => {
                        const key = s.day_of_week + '-' + s.start_node;
                        if (seen[key]) return; // 去重
                        seen[key] = true;
                        // 解析weeks数组，为每个周生成一个slot记录
                        let weekList = [curWeek];
                        try {
                            const w = JSON.parse(s.weeks || '[]');
                            if (w.length > 0) weekList = w;
                        } catch(e) {}
                        weekList.forEach(wn => {
                            selectedSlots.push({
                                week: Number(wn),
                                dayOfWeek: Number(s.day_of_week),
                                startNode: Number(s.start_node),
                                startTime: s.start_time, endTime: s.end_time,
                                credit: Number(s.step || 2),
                                step: Number(s.step || 2),
                                classroom: s.classroom || '', semester: s.semester || '2025-2026-2',
                                weeks: '[' + wn + ']'
                            });
                        });
                    });
                usedCredit = selectedSlots.reduce((sum, s) => sum + (s.credit || 2), 0);

                // 若数据库记录超出课程总课时，按时间顺序裁剪多余 slot
                if (usedCredit > totalCredit) {
                    // 按 (week, day, startNode) 排序，保留靠前的
                    selectedSlots.sort((a, b) =>
                        (a.week || 0) - (b.week || 0) || (a.dayOfWeek || 0) - (b.dayOfWeek || 0) || (a.startNode || 0) - (b.startNode || 0));
                    let cutCredit = 0;
                    const keep = [];
                    for (const s of selectedSlots) {
                        cutCredit += (s.credit || 2);
                        if (cutCredit <= totalCredit) { keep.push(s); } else { break; }
                    }
                    const dropped = selectedSlots.length - keep.length;
                    selectedSlots = keep;
                    usedCredit = selectedSlots.reduce((sum, s) => sum + (s.credit || 2), 0);
                    if (dropped > 0) {
                        alert('数据库排课记录超出课程总课时（' + totalCredit + '），已自动裁切最后 ' + dropped + ' 个时段。\n请检查并手动调整排课。');
                    }
                }
            } catch(e) {}
        }

        schedulePlannerState = {
            courseName, classId, className, courseId,
            totalCredit, remainingCredit: totalCredit - usedCredit,
            selectedSlots, existingCourses: [],
            currentWeek: curWeek, scheduled: scheduled || false
        };

        const overlay = document.createElement('div');
        overlay.id = 'plannerOverlay';
        overlay.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.4);z-index:1000;display:flex;align-items:center;justify-content:center;';
        overlay.innerHTML = '<div id="plannerDialog" style="background:#fff;border-radius:14px;width:95%;max-width:1000px;max-height:90vh;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,0.18);display:flex;flex-direction:column;">'
            + '<div id="plannerHeader" style="padding:16px 24px;border-bottom:1px solid #E5E7EB;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;">'
            + '<div><h3 style="font-size:16px;font-weight:600;color:#1D1D1F;">' + (scheduled ? '📝 修改排课' : '📅 首次排课') + ' · ' + escHtml(courseName) + ' · ' + escHtml(className) + '</h3>'
            + '<p style="font-size:12px;color:#86868B;margin-top:2px;">总课时：<b style="color:#0A84FF;">' + totalCredit + '</b> · 剩余：<b id="plannerRemain" style="color:#FF9500;">' + Math.max(0, totalCredit - usedCredit) + '</b> 课时 · 已选：<b id="plannerSelCount">' + selectedSlots.length + '</b> 个时段</p></div>'
            + '<div style="display:flex;gap:8px;">'
            + '<button onclick="closePlanner()" style="padding:6px 16px;border-radius:8px;border:1px solid #E5E7EB;background:#fff;color:#1D1D1F;font-size:13px;cursor:pointer;">取消</button>'
            + '<button id="btnPlannerConfirm" onclick="confirmPlanner()" style="padding:6px 16px;border-radius:8px;background:#0A84FF;color:#fff;border:none;font-size:13px;cursor:pointer;">确定排课</button>'
            + '</div></div>'
            + '<div id="plannerBody" style="flex:1;overflow:auto;padding:16px 24px;">'
            + '<div style="text-align:center;padding:40px;color:#86868B;">加载中...</div>'
            + '</div></div>';
        document.body.appendChild(overlay);

        overlay.addEventListener('click', function(e) { if (e.target === overlay) closePlanner(); });
        await loadPlannerWeek(schedulePlannerState.currentWeek);
    }

    function closePlanner() {
        const overlay = document.getElementById('plannerOverlay');
        if (overlay) overlay.remove();
    }

    /** 加载指定周的班级课表 */
    async function loadPlannerWeek(week) {
        schedulePlannerState.currentWeek = week;
        const body = document.getElementById('plannerBody');
        body.innerHTML = '<div style="text-align:center;padding:40px;color:#86868B;">加载中...</div>';
        try {
            const res = await fetch(API + '/api/schedule/teacher/class-schedule?classId='
                + schedulePlannerState.classId + '&week=' + week, {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            const data = await res.json();
            // 按 (course_name, day_of_week, start_node) 去重，并统一数字类型
            const seen = {};
            const uniqueSchedules = [];
            (data.schedules || []).forEach(s => {
                const key = s.course_name + '-' + s.day_of_week + '-' + s.start_node;
                if (!seen[key]) {
                    seen[key] = true;
                    uniqueSchedules.push({
                        ...s,
                        day_of_week: Number(s.day_of_week),
                        start_node: Number(s.start_node),
                        step: Number(s.step || 2)
                    });
                }
            });
            schedulePlannerState.existingCourses = uniqueSchedules;
            renderPlannerTable();
        } catch (e) {
            body.innerHTML = '<div style="text-align:center;padding:40px;color:#FF3B30;">加载失败</div>';
        }
    }

    /** 渲染课程表（带周选择器，教师自选周数+空位） */
    function renderPlannerTable() {
        const body = document.getElementById('plannerBody');
        const state = schedulePlannerState;
        const existing = state.existingCourses;
        const selected = state.selectedSlots;
        const week = state.currentWeek;
        const curWeek = getCurrentTeachWeek();
        const usedCredit = selected.reduce((sum, s) => sum + (s.credit || 2), 0);

        // 大节模式（匹配官方课表）：第1大节=01,02小节，第2大节=03,04小节...
        const periods = [
            { name: '第1大节', nodes: [1, 2], label: '(01,02小节)', start: '08:30', end: '09:55' },
            { name: '第2大节', nodes: [3, 4], label: '(03,04小节)', start: '10:10', end: '11:35' },
            { name: '第3大节', nodes: [5], label: '(05小节)', start: '11:40', end: '12:20' },
            { name: '第4大节', nodes: [6, 7], label: '(06,07小节)', start: '14:20', end: '15:45' },
            { name: '第5大节', nodes: [8, 9], label: '(08,09小节)', start: '16:00', end: '17:25' },
            { name: '第6大节', nodes: [10, 11, 12], label: '(10,11,12小节)', start: '19:10', end: '20:40' },
            { name: '第7大节', nodes: [13], label: '(13小节)', start: '20:50', end: '21:30' }
        ];
        const days = ['周一','周二','周三','周四','周五','周六','周日'];

        let html = '';

        // 周选择器（从当前周开始）
        html += '<div style="display:flex;align-items:center;gap:6px;margin-bottom:16px;flex-wrap:wrap;">';
        html += '<span style="font-size:13px;color:#86868B;margin-right:6px;">选择周次：</span>';
        for (let w = 1; w <= 18; w++) {
            const isActive = w === week;
            const isCurrent = w === curWeek;
            const hasSelected = selected.some(s => s.week === w);
            // 当前周=蓝色, 选中周=深蓝, 有数据=绿色, 空=灰色
            const bg = isActive ? '#5E6AD2' : (isCurrent ? '#E8F0FF' : (hasSelected ? '#E8F8ED' : '#F5F5F7'));
            const tc = isActive ? '#fff' : (isCurrent ? '#5E6AD2' : (hasSelected ? '#34C759' : '#86868B'));
            const border = isCurrent && !isActive ? 'border:2px solid #5E6AD2;' : '';
            html += '<span style="display:inline-flex;align-items:center;justify-content:center;'
                + 'width:34px;height:34px;border-radius:50%;font-size:12px;cursor:pointer;transition:all 0.15s;'
                + border + 'background:' + bg + ';color:' + tc + ';font-weight:' + (isActive||isCurrent?'600':'400') + ';" '
                + 'onclick="loadPlannerWeek(' + w + ')">' + w + '</span>';
        }
        html += '</div>';

        // 课时状态条
        const remaining = Math.max(0, state.totalCredit - usedCredit);
        html += '<div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;padding:10px 14px;background:#F5F5F7;border-radius:8px;font-size:13px;">';
        html += '已选：<b style="color:#34C759;">' + selected.length + '</b> 个时段（<b style="color:#34C759;">' + usedCredit + '</b> 课时） | ';
        html += '剩余：<b style="color:#FF9500;">' + remaining + '</b> 课时 | ';
        html += '当前：第 <b>' + week + '</b> 周';
        html += '</div>';

        // 已选列表
        if (selected.length > 0) {
            html += '<div style="background:#E8F8ED;padding:8px 14px;border-radius:8px;margin-bottom:12px;font-size:12px;color:#34C759;">';
            html += '✅ ' + selected.map(s => '第' + s.week + '周·周' + s.dayOfWeek + ' ' + s.startTime + '-' + s.endTime + (s.credit === 1 ? '(1课时)' : '')).join('；');
            html += '</div>';
        }

        // 课程表
        html += '<table style="width:100%;border-collapse:collapse;table-layout:fixed;">';
        html += '<thead><tr style="background:#F5F5F7;">';
        html += '<th style="padding:8px;font-size:12px;color:#86868B;font-weight:500;width:70px;">节次</th>';
        for (let d = 0; d < 7; d++) html += '<th style="padding:8px;font-size:12px;color:#86868B;font-weight:500;">' + days[d] + '</th>';
        html += '</tr></thead><tbody>';

        const occupiedMap = {}, occupiedInfo = {}, ownCourseMap = {};
        existing.forEach(c => {
            // Expand: a course at start_node=N with step=S covers nodes N through N+S-1
            const step = c.step || 2;
            for (let n = c.start_node; n < c.start_node + step; n++) {
                const k = c.day_of_week + '-' + n;
                if (c.course_name === state.courseName) {
                    let w = 1;
                    try { const arr = JSON.parse(c.weeks || '[1]'); if (arr.length > 0) w = arr[0]; } catch(e) {}
                    ownCourseMap[k] = { week: w, course: c };
                } else {
                    occupiedMap[k] = true;
                    occupiedInfo[k] = c;
                }
            }
        });

        for (let pi = 0; pi < periods.length; pi++) {
            const p = periods[pi];
            html += '<tr>';
            
            // 节次标签列
            const timeLabel = p.label ? `${p.start}<br/>${p.end}<br/><span style="font-size:9px;color:#A0A0A0;">${p.label}</span>` : p.start + '<br/>' + p.end;
            html += '<td style="padding:4px;font-size:11px;color:#86868B;text-align:center;background:#F5F5F7;border-bottom:1px solid #E5E7EB;vertical-align:middle;">' + timeLabel + '</td>';

            for (let d = 0; d < 7; d++) {
                const day = d + 1;
                
                // Check all child nodes of this 大节
                let cellCourseName = '', cellRoom = '', cellIsOwn = false, cellIsOther = false, cellIsSelected = false;
                let cellSlotKey = '';
                
                for (const node of p.nodes) {
                    const key = day + '-' + node;
                    if (ownCourseMap[key]) { cellIsOwn = true; cellSlotKey = key; break; }
                    if (occupiedMap[key]) { cellIsOther = true; cellCourseName = occupiedInfo[key].course_name; cellRoom = occupiedInfo[key].classroom || ''; break; }
                }
                
                // Check if selected (考虑多节课程 step 范围)
                for (const node of p.nodes) {
                    if (selected.find(s => s.week === week && s.dayOfWeek === day
                        && node >= s.startNode && node < s.startNode + (s.step || 2))) {
                        cellIsSelected = true; break;
                    }
                }
                
                let cellStyle, cellContent, onclick;
                
                if (cellIsSelected) {
                    const selSlot = selected.find(s => s.week === week && s.dayOfWeek === day
                        && p.nodes.some(n => n >= s.startNode && n < s.startNode + (s.step || 2)));
                    const sn = selSlot ? selSlot.startNode : p.nodes[0];
                    cellStyle = 'background:#34C759;border:2px solid #28A745;border-radius:6px;cursor:pointer;';
                    cellContent = `<div style="font-size:12px;color:#fff;font-weight:600;text-align:center;line-height:1.4;">${state.courseName}</div>`;
                    onclick = 'onclick="removeSlotByKey(' + day + ',' + sn + ',' + week + ')"';
                } else if (cellIsOwn) {
                    // 灰色框：数据库已有记录，点击可从 selectedSlots 中移除（相当于取消该周排课）
                    const ownSlot = selected.find(s => s.dayOfWeek === day
                        && p.nodes.some(n => n >= s.startNode && n < s.startNode + (s.step || 2)));
                    const ownWk = ownSlot ? ownSlot.week : 1;
                    const ownSn = ownSlot ? ownSlot.startNode : p.nodes[0];
                    cellStyle = 'background:#E5E7EB;border:2px solid #C7C7CC;border-radius:6px;cursor:pointer;';
                    cellContent = `<div style="font-size:10px;color:#86868B;font-weight:600;text-align:center;">本课程<br/>第${ownWk}周</div>`;
                    onclick = 'onclick="removeSlotByKey(' + day + ',' + ownSn + ',' + ownWk + ')"';
                } else if (cellIsOther) {
                    cellStyle = 'background:#F0F4FF;border:1px solid #D8E4FF;border-radius:6px;';
                    const shortName = cellCourseName.length > 8 ? cellCourseName.substring(0,8)+'...' : cellCourseName;
                    const shortRoom = cellRoom ? (cellRoom.length > 10 ? cellRoom.substring(0,10)+'...' : cellRoom) : '';
                    cellContent = `<div style="font-size:10px;color:#3A6BD5;font-weight:500;text-align:center;line-height:1.3;">
                        ${shortName}<br/><span style="font-size:9px;color:#7BA4E0;">${shortRoom}</span></div>`;
                    onclick = '';
                } else {
                    cellStyle = 'background:#FAFAFA;border:2px dashed #D1D1D6;border-radius:6px;cursor:pointer;transition:all 0.15s;';
                    cellContent = '<div style="font-size:10px;color:#C7C7CC;text-align:center;">空</div>';
                    onclick = 'onclick="toggleSlot(' + day + ',' + p.nodes[0] + ',\'' + p.start + '\',\'' + p.end + '\',' + week + ')"'
                        + ' onmouseover="this.firstChild.style.background=\'#E8F8ED\';this.firstChild.style.borderColor=\'#34C759\'"'
                        + ' onmouseout="this.firstChild.style.background=\'#FAFAFA\';this.firstChild.style.borderColor=\'#D1D1D6\'"';
                }

                html += '<td style="padding:3px;height:62px;border-bottom:1px solid #E5E7EB;" ' + onclick + '>'
                    + '<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;' + cellStyle + '">'
                    + cellContent + '</div></td>';
            }
            html += '</tr>';
            
            // 午休分隔线
            if (pi === 2) {
                html += '<tr><td colspan="8" style="padding:4px;text-align:center;font-size:10px;color:#FF9500;background:#FFF8F0;">'
                    + '——— 午休 12:20 - 14:20 ———</td></tr>';
            }
            // 晚餐分隔线
            if (pi === 4) {
                html += '<tr><td colspan="8" style="padding:4px;text-align:center;font-size:10px;color:#FF9500;background:#FFF8F0;">'
                    + '——— 晚休 17:25 - 19:10 ———</td></tr>';
            }
        }
        html += '</tbody></table>';
        body.innerHTML = html;
        // 更新头部计数器
        const selEl = document.getElementById('plannerSelCount');
        const remEl = document.getElementById('plannerRemain');
        if (selEl) selEl.textContent = selected.length;
        if (remEl) remEl.textContent = state.totalCredit - usedCredit;
    }

    /** 切换空位选中状态（支持单课时选择） */
    function toggleSlot(day, startNode, startTime, endTime, week) {
        const state = schedulePlannerState;
        // 检查该位置是否被任何在线课程占用（包括本门课程已排的，考虑 step 范围）
        const isOccupied = state.existingCourses.some(c =>
            c.day_of_week === day
            && startNode >= c.start_node && startNode < c.start_node + (c.step || 2));
        if (isOccupied) return;

        // 检查本门课程是否已在当前周选中（取消切换）
        const anyWeekIdx = state.selectedSlots.findIndex(s => s.dayOfWeek === day
            && startNode >= s.startNode && startNode < s.startNode + (s.step || 2));
        if (anyWeekIdx >= 0) {
            const curWeekIdx = state.selectedSlots.findIndex(s => s.week === week && s.dayOfWeek === day
                && startNode >= s.startNode && startNode < s.startNode + (s.step || 2));
            if (curWeekIdx >= 0) {
                // 当前周已选中 → 取消
                state.selectedSlots.splice(curWeekIdx, 1);
                recalcRemaining();
                renderPlannerTable();
                return;
            }
            // 其他周已选中 → 不影响，同位置不同周可共存（只要课时够）
        }

        const usedCredit = state.selectedSlots.reduce((sum, s) => sum + (s.credit || 2), 0);
        const remaining = state.totalCredit - usedCredit;

        if (remaining <= 0) {
            alert('课时已用完！该课程只有 ' + state.totalCredit + ' 课时。');
            return;
        }

        // 第5节（11:40-12:20，node=3）只有40分钟=1课时，直接选
        if (startNode === 3) {
            state.selectedSlots.push({
                week: week, dayOfWeek: day, startNode: startNode, step: 1,
                startTime: startTime, endTime: endTime, credit: 1,
                classroom: '', semester: '2025-2026-2',
                weeks: '[' + week + ']', subNode: 5
            });
            recalcRemaining();
            renderPlannerTable();
            return;
        }

        // 剩余课时≥2：直接选完整空位（2课时）
        if (remaining >= 2) {
            state.selectedSlots.push({
                week: week, dayOfWeek: day, startNode: startNode, step: 2,
                startTime: startTime, endTime: endTime, credit: 2,
                classroom: '', semester: '2025-2026-2',
                weeks: '[' + week + ']'
            });
            recalcRemaining();
            renderPlannerTable();
            return;
        }

        // 剩余1课时：弹出选择具体节次
        showSubNodePicker(day, startNode, startTime, endTime, week);
    }

    /** 剩余1课时时，弹出选择第几节 */
    function showSubNodePicker(day, startNode, startTime, endTime, week) {
        const state = schedulePlannerState;
        const subNodes = getSubNodes(startNode);

        const overlay = document.createElement('div');
        overlay.id = 'subNodePicker';
        overlay.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.3);z-index:2000;display:flex;align-items:center;justify-content:center;';
        overlay.innerHTML = '<div style="background:#fff;border-radius:14px;padding:24px 28px;box-shadow:0 4px 24px rgba(0,0,0,0.15);text-align:center;max-width:360px;">'
            + '<h4 style="font-size:15px;font-weight:600;margin-bottom:6px;">选择节次（剩余1课时）</h4>'
            + '<p style="font-size:12px;color:#86868B;margin-bottom:16px;">第' + week + '周 · 周' + day + ' · ' + startTime + '-' + endTime + '</p>'
            + '<div style="display:flex;gap:10px;justify-content:center;margin-bottom:16px;">'
            + subNodes.map(sn => '<button style="padding:8px 20px;border-radius:8px;background:#0A84FF;color:#fff;border:none;font-size:13px;cursor:pointer;" '
                + 'onclick="pickSubNode(' + day + ',' + startNode + ',' + week + ',' + sn.node + ')">第' + sn.label + '节</button>').join('')
            + '</div>'
            + '<button style="padding:6px 16px;border-radius:8px;border:1px solid #E5E7EB;background:#fff;color:#86868B;font-size:12px;cursor:pointer;" '
            + 'onclick="document.getElementById(\'subNodePicker\').remove()">取消</button>'
            + '</div>';
        document.body.appendChild(overlay);
        overlay.addEventListener('click', function(e) { if (e.target === overlay) overlay.remove(); });
    }

    /** 根据 startNode 返回对应的小节 */
    function getSubNodes(startNode) {
        const map = {
            1: [{ node: 1, label: '1' }, { node: 2, label: '2' }],   // 08:30-09:55
            2: [{ node: 3, label: '3' }, { node: 4, label: '4' }],   // 10:10-11:35
            4: [{ node: 6, label: '6' }, { node: 7, label: '7' }],   // 14:20-15:45
            5: [{ node: 8, label: '8' }, { node: 9, label: '9' }],   // 16:00-17:25
            6: [{ node: 10, label: '10' }, { node: 11, label: '11' }] // 19:10-21:30
        };
        return map[startNode] || [{ node: startNode, label: String(startNode) }];
    }

    /** 选择具体小节 */
    function pickSubNode(day, startNode, week, subNode) {
        document.getElementById('subNodePicker').remove();
        const state = schedulePlannerState;
        const periodInfo = getPeriodByNode(startNode);

        state.selectedSlots.push({
            week: week, dayOfWeek: day, startNode: startNode, step: 1,
            startTime: periodInfo.start, endTime: periodInfo.end, credit: 1,
            classroom: '', semester: '2025-2026-2',
            weeks: '[' + week + ']', subNode: subNode
        });
        recalcRemaining();
        renderPlannerTable();
    }

    function getPeriodByNode(startNode) {
        const map = {
            1: { start: '08:30', end: '09:55' }, 2: { start: '10:10', end: '11:35' },
            3: { start: '11:40', end: '12:20' }, 4: { start: '14:20', end: '15:45' },
            5: { start: '16:00', end: '17:25' }, 6: { start: '19:10', end: '21:30' }
        };
        return map[startNode] || { start: '08:30', end: '09:55' };
    }

    /** 移除已选空位 */
    function removeSlot(day, startNode, week) {
        removeSlotByKey(day, startNode, week);
    }
    function removeSlotByKey(day, startNode, week) {
        const idx = schedulePlannerState.selectedSlots.findIndex(s =>
            s.week === week && s.dayOfWeek === day && s.startNode === startNode);
        if (idx >= 0) {
            schedulePlannerState.selectedSlots.splice(idx, 1);
            recalcRemaining();
            renderPlannerTable();
        }
    }

    /** 重新计算剩余课时 */
    function recalcRemaining() {
        const state = schedulePlannerState;
        const usedCredit = state.selectedSlots.reduce((sum, s) => sum + (s.credit || 2), 0);
        state.remainingCredit = state.totalCredit - usedCredit;
    }

    /** 确认排课（在线课程中排课） */
    async function confirmPlanner() {
        const state = schedulePlannerState;

        // 没有选空位
        if (state.selectedSlots.length === 0) {
            // 已排课的班级：确认清除排课，恢复灰色标签
            if (state.scheduled) {
                if (!confirm('确定清除「' + state.courseName + '」在「' + state.className + '」的排课？\n该班级将变为"未排课"状态。')) return;
                try {
                    const res = await fetch(API + '/api/schedule/import/clear-class-schedule', {
                        method: 'POST',
                        headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
                        body: JSON.stringify({ courseName: state.courseName, classId: state.classId })
                    });
                    const data = await res.json();
                    if (data.error) { alert(data.error); } else {
                        updateClazzTag(state.courseId, state.classId, false);
                        // 刷新课程列表，确保排课按钮状态更新
                        loadCourses();
                    }
                } catch(e) { alert('操作失败'); }
                closePlanner();
                return;
            }
            // 未排课的班级：直接关闭，不做任何改变
            closePlanner();
            return;
        }

        // 选了空位：提交排课
        const mode = state.scheduled ? '更新' : '设置';
        const usedCr = state.selectedSlots.reduce((sum, s) => sum + (s.credit || 2), 0);
        const remainCr = state.totalCredit - usedCr;
        const remainMsg = remainCr > 0 ? '\n剩余 ' + remainCr + ' 课时未排。' : '\n课时已排满。';
        if (!confirm('确定' + mode + '「' + state.courseName + '」在「' + state.className + '」的排课？\n已选 ' + state.selectedSlots.length + ' 个时段（' + usedCr + ' 课时）。' + remainMsg)) return;
        try {
            const res = await fetch(API + '/api/schedule/import/unhide', {
                method: 'POST',
                headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
                body: JSON.stringify({ courseName: state.courseName, slots: state.selectedSlots, classId: state.classId })
            });
            const data = await res.json();
            if (data.error) { alert(data.error); } else {
                updateClazzTag(state.courseId, state.classId, true);
                loadCourses();
            }
        } catch(e) { alert('操作失败'); }
        closePlanner();
    }

    /** 联动更新卡片上的班级标签为蓝色✔ */
    function updateClazzTag(courseId, classId, scheduled) {
        const tagId = 'clazzTag_' + courseId + '_' + classId;
        const tagEl = document.getElementById(tagId);
        if (!tagEl) return;
        if (scheduled) {
            tagEl.style.background = '#E8F0FE';
            tagEl.style.color = '#0A84FF';
            tagEl.style.border = '1px solid #B8D4FE';
            // 更新文字中的图标
            const text = tagEl.textContent;
            if (text.startsWith('○')) {
                tagEl.textContent = '✔' + text.substring(1);
            }
        } else {
            tagEl.style.background = '#F5F5F7';
            tagEl.style.color = '#86868B';
            tagEl.style.border = '1px solid #E5E7EB';
            const text = tagEl.textContent;
            if (text.startsWith('✔')) {
                tagEl.textContent = '○' + text.substring(1);
            }
        }
    }

    // ===== 导入课表弹窗 =====

        importPreviewData = null;
        const overlay = document.createElement('div');
        overlay.id = 'importOverlay';
        overlay.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.35);z-index:999;display:flex;align-items:center;justify-content:center;';
        overlay.innerHTML = `<div style="background:#fff;border-radius:14px;padding:28px;width:620px;max-height:80vh;overflow:auto;box-shadow:0 4px 24px rgba(0,0,0,0.12);">

    function closeImport() {

    async function doImport() {
        const file = document.getElementById('importFile').files[0];
        if (!file) { alert('请选择文件'); return; }

        const result = document.getElementById('importResult');
        const btn = document.getElementById('btnDoImport');
        result.innerHTML = '<span style="color:#0A84FF;">⏳ AI 正在分析课表...</span>';
        btn.style.display = 'none';  // 隐藏"开始导入"按钮

        const formData = new FormData();
        formData.append('file', file);

        try {
            const res = await fetch(API + '/api/schedule/import/preview', {
                method: 'POST', headers: { 'Authorization': 'Bearer ' + token }, body: formData
            });
            const data = await res.json();

            if (data.error) { result.innerHTML = '<span style="color:#FF3B30;">' + data.error + '</span>'; btn.style.display = 'inline-block'; return; }

            let html = '';
            if (data.errors && data.errors.length > 0) {

                    html += '<div style="background:#FFF5F5;padding:8px 12px;margin:4px 0;border-radius:6px;">';
                    html += '第' + e.row + '行《' + (e.courseName||'未知') + '》：' + (e.errors||[]).join('、');
                    html += '</div>';
                });
            }
            if (data.preview && data.preview.length > 0) {
                importPreviewData = data.preview;
                // 提取课程名（去重）用于设置课时
                const courseNames = [...new Set(data.preview.map(p => p.courseName))];

                html += '<div style="color:#34C759;margin:12px 0 8px;font-weight:500;">✅ ' + data.preview.length + ' 条可导入：</div>';

                // 课时设置区域
                html += '<div style="background:#F5F5F7;padding:12px 14px;border-radius:8px;margin-bottom:12px;">';
                html += '<span style="font-size:12px;color:#86868B;">📝 设置课程总课时（1个空位=2课时）：</span>';
                courseNames.forEach(cn => {
                    html += '<div style="display:flex;align-items:center;gap:8px;margin-top:8px;">';
                    html += '<span style="font-size:13px;font-weight:500;min-width:120px;">' + escHtml(cn) + '</span>';
                    html += '<input type="number" id="creditInput_' + escJs(cn).replace(/[^a-zA-Z0-9\u4e00-\u9fa5]/g,'_') + '" value="2" min="1" max="20" '
                        + 'style="width:60px;padding:4px 8px;border:1px solid #E5E7EB;border-radius:6px;font-size:13px;text-align:center;"/>';
                    html += '<span style="font-size:11px;color:#86868B;">课时</span>';
                    html += '</div>';
                });
                html += '</div>';

                html += '<table style="width:100%;font-size:12px;border-collapse:collapse;margin-bottom:12px;"><thead><tr style="background:#F5F5F7;">';
                html += '<th style="padding:8px;text-align:left;border-bottom:1px solid #E5E7EB;">课程</th><th style="padding:8px;text-align:left;border-bottom:1px solid #E5E7EB;">班级</th><th style="padding:8px;text-align:left;border-bottom:1px solid #E5E7EB;">周几</th><th style="padding:8px;text-align:left;border-bottom:1px solid #E5E7EB;">时间</th><th style="padding:8px;text-align:left;border-bottom:1px solid #E5E7EB;">教室</th></tr></thead><tbody>';
                data.preview.forEach(p => {
                    html += '<tr><td style="padding:6px 8px;border-bottom:1px solid #F5F5F7;">' + escHtml(p.courseName||'') + '</td>';
                    html += '<td style="padding:6px 8px;border-bottom:1px solid #F5F5F7;">' + escHtml(p.className||'') + '</td>';
                    html += '<td style="padding:6px 8px;border-bottom:1px solid #F5F5F7;">周' + p.dayOfWeek + '</td>';
                    html += '<td style="padding:6px 8px;border-bottom:1px solid #F5F5F7;">' + escHtml(p.startTime||'') + '-' + escHtml(p.endTime||'') + '</td>';
                    html += '<td style="padding:6px 8px;border-bottom:1px solid #F5F5F7;">' + escHtml(p.classroom||'') + '</td></tr>';
                });
                html += '</tbody></table>';
                const btnArea = document.getElementById('importBtnArea');
                btnArea.innerHTML = '<button class="btn btn-outline" onclick="closeImport()" style="padding:8px 20px;border-radius:8px;border:1px solid #E5E7EB;background:#fff;color:#1D1D1F;font-size:14px;cursor:pointer;">取消</button>'
                    + '<button class="btn btn-primary" onclick="confirmImport()" style="padding:8px 20px;border-radius:8px;background:#0A84FF;color:#fff;border:none;font-size:14px;cursor:pointer;">✅ 确认导入 ' + data.preview.length + ' 条</button>';
            } else {
                // 没有可导入数据，恢复按钮
                btn.style.display = 'inline-block';
            }

            if (!html) {
                html = '<div style="color:#FF9500;padding:16px 0;">⚠️ AI 未能识别到课表数据。请确认文件中包含课程名、班级、时间等列。';
                if (data.raw) html += '<br/><small style="color:#86868B;">AI 回复：' + data.raw + '</small>';

    async function confirmImport() {
        if (!importPreviewData || importPreviewData.length === 0) { alert('没有可导入的数据'); return; }
        const btn = event.target;
        btn.disabled = true;
        btn.textContent = '导入中...';

        // 读取教师设置的课时，注入到预览数据中
        const courseNames = [...new Set(importPreviewData.map(p => p.courseName))];
        const creditMap = {};
        courseNames.forEach(cn => {
            const inputId = 'creditInput_' + escJs(cn).replace(/[^a-zA-Z0-9\u4e00-\u9fa5]/g,'_');
            const inputEl = document.getElementById(inputId);
            if (inputEl) creditMap[cn] = parseInt(inputEl.value) || 2;
        });
        // 给每条数据加上 credit
        const finalData = importPreviewData.map(p => ({ ...p, credit: creditMap[p.courseName] || 2 }));

        const res = await fetch(API + '/api/schedule/import/confirm', {
            method: 'POST', headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
            body: JSON.stringify(finalData)
        });
        const data = await res.json();
        let msg = '导入完成：成功 ' + (data.imported||0) + ' 条';
        if (data.skipped > 0) {
            msg += '，跳过 ' + data.skipped + ' 条';
        }
        msg += '\n\n所有课程已存入「已下架课程」，请手动上架。';
        if (data.messages && data.messages.length > 0) {
            msg += '\n\n' + data.messages.join('\n');
        }
        alert(msg);
        closeImport();
        loadCourses();
    }

    /** 绘制六边形雷达图 (Canvas) */
    function drawStudentRadar(scores) {
        const canvas = document.getElementById('chartStuRadar');
        if (!canvas) return;
        const ctx = canvas.getContext('2d');

        // 适配DPR
        const dpr = window.devicePixelRatio || 1;
        const rect = canvas.parentElement.getBoundingClientRect();
        const W = rect.width * dpr;
        const H = Math.min(280, W) * dpr;
        canvas.width = W;
        canvas.height = H;
        canvas.style.width = rect.width + 'px';
        canvas.style.height = Math.min(280, W) + 'px';

        const padding = 40 * dpr; // 边距，防止标签被截断
        const cx = W / 2, cy = H / 2;
        const maxVal = 10; // 满分10
        const minR = 30 * dpr;  // 最小半径
        const maxR = (Math.min(W, H) - padding * 2) / 2; // 最大半径，预留边距

        if (!scores || scores.length === 0) {
            ctx.fillStyle = '#8E8E93';
            ctx.font = `${14*dpr}px -apple-system, sans-serif`;
            ctx.textAlign = 'center';
            ctx.fillText('暂无测评数据', cx, cy);
            return;
        }

        const n = scores.length; // 6 维
        const angleStep = (Math.PI * 2) / n;

        // 计算六边形顶点
        function getXY(i, val) {
            const angle = -Math.PI / 2 + i * angleStep; // 从顶部开始
            const r = minR + (val / maxVal) * (maxR - minR);
            return { x: cx + r * Math.cos(angle), y: cy + r * Math.sin(angle) };
        }

        // 绘制背景网格（5层同心六边形）
        for (let level = 0; level <= 4; level++) {
            ctx.beginPath();
            const proportion = (level + 1) / 5;
            for (let i = 0; i < n; i++) {
                const angle = -Math.PI / 2 + i * angleStep;
                const r = minR + proportion * (maxR - minR);
                const x = cx + r * Math.cos(angle);
                const y = cy + r * Math.sin(angle);
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.closePath();
            ctx.strokeStyle = level === 4 ? '#D1D1D6' : '#E5E5EA';
            ctx.lineWidth = level === 4 ? 1.5 * dpr : 0.8 * dpr;
            ctx.stroke();
        }

        // 绘制轴线
        for (let i = 0; i < n; i++) {
            const angle = -Math.PI / 2 + i * angleStep;
            const x = cx + maxR * Math.cos(angle);
            const y = cy + maxR * Math.sin(angle);
            ctx.beginPath();
            ctx.moveTo(cx, cy);
            ctx.lineTo(x, y);
            ctx.strokeStyle = '#E5E5EA';
            ctx.lineWidth = 0.5 * dpr;
            ctx.stroke();
        }

        // 绘制数据区域（半透明填充）
        ctx.beginPath();
        for (let i = 0; i < n; i++) {
            const val = scores[i].value || 0;
            const { x, y } = getXY(i, val);
            if (i === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
        }
        ctx.closePath();
        ctx.fillStyle = 'rgba(94, 106, 210, 0.15)';
        ctx.fill();
        ctx.strokeStyle = '#5E6AD2';
        ctx.lineWidth = 2 * dpr;
        ctx.lineJoin = 'round';
        ctx.stroke();

        // 绘制数据点
        for (let i = 0; i < n; i++) {
            const val = scores[i].value || 0;
            const { x, y } = getXY(i, val);
            ctx.beginPath();
            ctx.arc(x, y, 4 * dpr, 0, Math.PI * 2);
            ctx.fillStyle = '#5E6AD2';
            ctx.fill();
            ctx.strokeStyle = '#FFFFFF';
            ctx.lineWidth = 1.5 * dpr;
            ctx.stroke();
        }

        // 绘制标签 + 分数（顶部/底部自适应偏移防止截断）
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        for (let i = 0; i < n; i++) {
            const val = scores[i].value || 0;
            const angle = -Math.PI / 2 + i * angleStep;
            const labelR = maxR + 20 * dpr;
            const lx = cx + labelR * Math.cos(angle);
            const ly = cy + labelR * Math.sin(angle);

            // 根据角度调整文本偏移：顶部标签下移，底部标签上移
            const nameOffY = angle < -Math.PI / 2 ? 10 * dpr : (angle > Math.PI / 2 ? -10 * dpr : -7 * dpr);
            const valOffY = angle < -Math.PI / 2 ? 26 * dpr : (angle > Math.PI / 2 ? 6 * dpr : 9 * dpr);

            const name = formatScoreName(scores[i].name || '');
            ctx.font = `500 ${11*dpr}px -apple-system, "PingFang SC", sans-serif`;
            ctx.fillStyle = '#1D1D1F';
            ctx.fillText(name, lx, ly + nameOffY);

            ctx.font = `600 ${13*dpr}px -apple-system, "PingFang SC", sans-serif`;
            ctx.fillStyle = '#5E6AD2';
            ctx.fillText(val + '', lx, ly + valOffY);
        }
    }

    /** 缩短标签名：『逻辑思维力』→「逻辑」 */
    function formatScoreName(raw) {
        const map = {
            '逻辑思维力': '逻辑', '判断决策力': '判断', '专注耐力': '专注',
            '专业学习力': '专业', '信息检索力': '检索', '自律执行力': '自律'
        };
        return map[raw] || raw.substring(0, 2);
    }

        }
    }, 200);
            html += '<div class="card"><div class="card-title">👥 导入学生名单</div><p style="font-size:12px;color:#86868B;margin-bottom:8px;">每行一个学生：<b>学号</b> Tab键 <b>姓名</b><br>默认密码: 123456</p><textarea id="mgStudentList" rows="6" style="width:100%;padding:8px;border:1px solid #E5E7EB;border-radius:8px;font-size:13px;font-family:monospace;" placeholder="2515100120&#9;张三&#10;2515100121&#9;李四&#10;2515100122&#9;王五"></textarea><button onclick="doImportStudents()" style="margin-top:8px;padding:8px 20px;background:#5E6AD2;color:#fff;border:none;border-radius:8px;font-size:13px;cursor:pointer;">批量导入</button><span id="mgStudentMsg" style="margin-left:8px;font-size:12px;color:#34C759;"></span></div>';
            html += '</div></div>';

            content.innerHTML = html;
        } catch (e) {
            content.innerHTML = '<div style="text-align:center;padding:60px;color:#FF3B30;">无法连接后端服务器</div>';
        }
    }

    function selectManageClass(id, name) {
        manageClassId = id; manageClassName = name;
        document.getElementById('mgImportArea').style.display = 'block';
        setTimeout(() => document.getElementById('mgImportArea').scrollIntoView({ behavior: 'smooth' }), 100);
    }

    async function doCreateClass() {
        const cn = document.getElementById('mgClassName').value.trim();
        if (!cn) { alert('请输入班级名称'); return; }
        const body = { className: cn, grade: document.getElementById('mgGrade').value.trim(), major: document.getElementById('mgMajor').value.trim(), department: document.getElementById('mgDept').value.trim() };
        try {
            const res = await fetch(API + '/api/teacher/class/create', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token }, body: JSON.stringify(body) });
            const data = await res.json();
            const msgEl = document.getElementById('mgCreateMsg');
            if (data.classId) {
                manageClassId = data.classId; manageClassName = data.className;
                msgEl.textContent = ' 创建成功！可在下方导入课表和学生';
                msgEl.style.color = '#34C759';
                document.getElementById('mgImportArea').style.display = 'block';
                setTimeout(() => document.getElementById('mgImportArea').scrollIntoView({ behavior: 'smooth' }), 100);
            } else {
                msgEl.textContent = ' 创建失败: ' + (data.error||'');
                msgEl.style.color = '#FF3B30';
            }
        } catch (e) { const msgEl = document.getElementById('mgCreateMsg'); msgEl.textContent = ' 网络错误'; msgEl.style.color = '#FF3B30'; }
    }

    async function doImportSchedule() {
        if (!manageClassId) { alert('请先创建或选择一个班级'); return; }
        const html = document.getElementById('mgScheduleHtml').value.trim();
        if (!html) { alert('请粘贴课表HTML'); return; }
        if (!/<table/i.test(html)) { alert('内容不以<table开头！请确认复制了正确的课表HTML，不是日志或其他文字。'); return; }
        const msgEl = document.getElementById('mgScheduleMsg');
        msgEl.textContent = ' 解析中...'; msgEl.style.color = '#86868B';
        try {
            const res = await fetch(API + '/api/teacher/class/import-schedule', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token }, body: JSON.stringify({ classId: manageClassId, html: html }) });
            const data = await res.json();
            msgEl.textContent = ' ' + (data.msg || '导入完成');
            msgEl.style.color = '#34C759';
        } catch (e) { msgEl.textContent = ' 网络错误'; msgEl.style.color = '#FF3B30'; }
    }

    async function doImportStudents() {
        if (!manageClassId) { alert('请先创建或选择一个班级'); return; }
        const students = document.getElementById('mgStudentList').value.trim();
        if (!students) { alert('请粘贴学生名单'); return; }
        const msgEl = document.getElementById('mgStudentMsg');
        msgEl.textContent = ' 导入中...'; msgEl.style.color = '#86868B';
        try {
            const res = await fetch(API + '/api/teacher/class/import-students', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token }, body: JSON.stringify({ classId: manageClassId, students: students }) });
            const data = await res.json();
            const added = data.created || 0;
            const msg = added > 0 ? '成功添加 '+added+' 名学生' : ('出错: '+(data.errors||[]).join(', '));
            msgEl.textContent = ' ' + msg;
            msgEl.style.color = added > 0 ? '#34C759' : '#FF3B30';
        } catch (e) { msgEl.textContent = ' 网络错误'; msgEl.style.color = '#FF3B30'; }
    }
</script>
</body>
</html>
